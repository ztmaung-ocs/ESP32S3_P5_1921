; PlatformIO project for P5-1921-64x32-8S HUB75 LED Matrix
; ESP32-S3 + ESP32-HUB75-MatrixPanel-DMA

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3 with PSRAM (N8R8) - uncomment if using PSRAM for DMA buffer
; board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

lib_deps =
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
    adafruit/Adafruit GFX Library
